<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internships & Hackathons - UniLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../assets/css/student_dashboard.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">UniLink</div>
    </div>
    <nav class="nav-items">
      <a href="../../pages/student/student_dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i> <span>Dashboard</span></a>
      <a href="../../pages/common/announcements.html" class="nav-item"><i class="ph ph-megaphone"></i> <span>Important Announcements</span></a>
      <a href="../../pages/student/deadlines.html" class="nav-item"><i class="ph ph-calendar-check"></i> <span>Assignment Deadlines</span></a>
      <a href="../../pages/common/internships.html" class="nav-item active"><i class="ph ph-rocket"></i> <span>Internships & Hackathons</span></a>
      <a href="../../pages/common/events.html" class="nav-item"><i class="ph ph-ticket"></i> <span>Event Registration</span></a>
      <a href="../../pages/common/scholarships.html" class="nav-item"><i class="ph ph-graduation-cap"></i> <span>Scholarships</span></a>
      <a href="../../pages/common/blog.html" class="nav-item"><i class="ph ph-article"></i> <span>Blog</span></a>
    </nav>
    <nav class="nav-items" style="margin-top: auto;">
      <a href="#" class="nav-item text-danger" id="logoutBtn"><i class="ph ph-sign-out"></i> <span style="color: #e11d48;">Log Out</span></a>
    </nav>
  </aside>

  <main class="main-wrapper">
    <header class="top-nav">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="mobile-menu-btn"><i class="ph ph-list"></i></button>
      </div>
      <div class="profile-area" style="margin-left: auto;">
        <button class="icon-btn" id="themeToggleBtn"><i class="ph ph-moon"></i></button>
        <a href="../../pages/student/student_profile.html" class="user-profile" style="text-decoration: none; color: inherit; cursor: pointer;">
          <div class="avatar" id="navAvatar">S</div>
          <div class="user-info">
            <span class="user-name" id="navUserName">Student</span>
            <span class="user-role">Student</span>
          </div>
          <i class="ph ph-caret-down" style="color: var(--text-muted); margin-left: 8px;"></i>
        </a>
      </div>
    </header>

    <section class="welcome-section">
      <h1 class="welcome-title">Internships & Hackathons</h1>
      <p style="color: var(--text-muted); font-size: 15px;">Explore the latest internship openings and hackathon registrations.</p>
    </section>

    <div class="filter-tabs" id="typeFilters">
      <button class="filter-tab active" data-filter="All">All</button>
      <button class="filter-tab" data-filter="Internship">Internships</button>
      <button class="filter-tab" data-filter="Hackathon">Hackathons</button>
    </div>

    <div class="job-grid" id="internshipsGrid">
      <p style="color: var(--text-muted); text-align: center; grid-column: 1 / -1; padding: 40px 0;">Loading opportunities...</p>
    </div>

    <!-- Details Modal -->
    <div class="modal-overlay" id="infoModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
      <div class="modal-content" style="background: var(--bg-main); padding: 24px; border-radius: 8px; width: 90%; max-width: 400px; position: relative; color: var(--text-main);">
        <button id="closeInfoModal" style="position: absolute; right: 16px; top: 16px; background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-muted);">&times;</button>
        <h2 id="infoModalTitle" style="margin-top: 0; font-size: 18px; padding-right: 20px;">Details</h2>
        <p id="infoModalBody" style="color: var(--text-muted); margin-top: 12px; font-size: 14px; line-height: 1.5;"></p>
      </div>
    </div>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem('userRole') === 'Teacher') {
        const tName = localStorage.getItem('teacherName') || 'Faculty';
        document.getElementById('navUserName').innerText = tName;
        document.getElementById('navAvatar').innerText = tName.charAt(0).toUpperCase();
        const roleSpan = document.querySelector('.user-role');
        if(roleSpan) roleSpan.innerText = 'Faculty';
        document.querySelector('.user-profile').href = '../../pages/teacher/teacher_profile.html';

        // Override Sidebar
        document.querySelector('.sidebar .nav-items').innerHTML = `
          <a href="../../pages/teacher/teacher_dashboard.html#dashboard" class="nav-item"><i class="ph ph-squares-four"></i> <span>Overview</span></a>
          <a href="../../pages/teacher/teacher_dashboard.html#post-announcement" class="nav-item"><i class="ph ph-megaphone"></i> <span>Post Announcement</span></a>
          <a href="../../pages/teacher/teacher_dashboard.html#manage-assignments" class="nav-item"><i class="ph ph-calendar-check"></i> <span>Manage Assignments</span></a>
          <a href="../../pages/teacher/teacher_dashboard.html#student-list" class="nav-item"><i class="ph ph-users"></i> <span>My Students</span></a>
          <a href="../../pages/teacher/teacher_dashboard.html#opportunities" class="nav-item active"><i class="ph ph-rocket"></i> <span>Opportunities</span></a>
          <a href="../../pages/teacher/teacher_dashboard.html#scholarships" class="nav-item"><i class="ph ph-graduation-cap"></i> <span>Scholarships</span></a>
          <a href="../../pages/teacher/teacher_dashboard.html#events" class="nav-item"><i class="ph ph-ticket"></i> <span>Manage Events</span></a>
        `;
        
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../../pages/auth/teacher_login.html';
          });
        }
      } else {
        const storedName = localStorage.getItem('userName');
        if (storedName) {
          document.getElementById('navUserName').innerText = storedName;
          document.getElementById('navAvatar').innerText = storedName.charAt(0).toUpperCase();
        }
        
        // Student Logout logic
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../../pages/auth/student_login.html';
          });
        }
      }

      // Theme logic
      const themeToggleBtn = document.getElementById('themeToggleBtn');
      if (themeToggleBtn) {
        const themeIcon = themeToggleBtn.querySelector('i');
        if (localStorage.getItem('theme') === 'dark') {
          document.body.classList.add('dark-theme');
          themeIcon.classList.replace('ph-moon', 'ph-sun');
        }
        themeToggleBtn.addEventListener('click', () => {
          document.body.classList.toggle('dark-theme');
          if (document.body.classList.contains('dark-theme')) {
            localStorage.setItem('theme', 'dark');
            themeIcon.classList.replace('ph-moon', 'ph-sun');
          } else {
            localStorage.setItem('theme', 'light');
            themeIcon.classList.replace('ph-sun', 'ph-moon');
          }
        });
      }

      let allInternships = [];

      function renderInternships(items) {
        const grid = document.getElementById('internshipsGrid');
        grid.innerHTML = '';
        if (items.length > 0) {
          items.forEach(item => {
            const colors = ['#ea4335', '#0f9d58', '#4285f4', '#f4b400', '#6366f1'];
            const cName = item.company ? item.company.charAt(0).toUpperCase() : 'C';
            const randColor = colors[Math.floor(Math.random() * colors.length)];
            const borderTop = item.type === 'Hackathon' ? 'border-top: 4px solid var(--primary);' : '';

            grid.innerHTML += `
              <div class="job-card" style="${borderTop}">
                <div class="job-header">
                  <div class="company-logo" style="background: ${randColor}; color: #fff;">${cName}</div>
                  <div class="job-titles">
                    <h3>${item.title}</h3>
                    <span class="company-name">${item.company}</span>
                  </div>
                </div>
                <div class="job-tags">
                  <span class="tag bg-indigo-light color-indigo">${item.type}</span>
                </div>
                <p class="job-desc">${item.description}</p>
                <div class="job-footer">
                  <span class="apply-deadline">Deadline: ${new Date(item.deadline).toLocaleDateString()}</span>
                  <div style="display: flex; gap: 8px;">
                    <button data-title="${item.title.replace(/"/g, '&quot;')}" data-desc="${item.description.replace(/"/g, '&quot;')}" data-fileurl="${item.fileUrl || ''}" data-filename="${item.fileName || ''}" class="primary-btn info-btn" style="background: transparent; color: var(--text-main); border: 1px solid var(--border-color); cursor: pointer;">Details</button>
                    <a href="${item.applyLink}" target="_blank" class="apply-btn" style="text-decoration: none;">Apply Now</a>
                  </div>
                </div>
              </div>
            `;
          });
        } else {
          grid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1 / -1; text-align: center; padding: 40px 0;">No opportunities found.</p>';
        }
      }

      fetch('/api/internships')
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            allInternships = data.data;
            renderInternships(allInternships);
          }
        });

      // Filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const filter = tab.dataset.filter;
          if (filter === 'All') {
            renderInternships(allInternships);
          } else {
            renderInternships(allInternships.filter(i => i.type === filter));
          }
        });
      });

      // Modal Logic
      const infoModal = document.getElementById('infoModal');
      document.getElementById('closeInfoModal').addEventListener('click', () => infoModal.style.display = 'none');
      infoModal.addEventListener('click', (e) => { if(e.target === infoModal) infoModal.style.display = 'none'; });

      document.getElementById('internshipsGrid').addEventListener('click', (e) => {
        if (e.target.classList.contains('info-btn')) {
           const title = e.target.getAttribute('data-title');
           const desc = e.target.getAttribute('data-desc');
           const fileUrl = e.target.getAttribute('data-fileurl');
           const fileName = e.target.getAttribute('data-filename');

           document.getElementById('infoModalTitle').textContent = title;
           document.getElementById('infoModalBody').textContent = desc;

           // Handle attachment download button
           let footer = document.querySelector('.modal-footer-btns');
           if (!footer) {
             footer = document.createElement('div');
             footer.className = 'modal-footer-btns';
             document.querySelector('.modal-content').appendChild(footer);
           }
           if (fileUrl) {
             footer.innerHTML = `<a href="${fileUrl}" download="${fileName}" class="attachment-btn"><i class="ph ph-file-arrow-down"></i> Download Attachment (${fileName})</a>`;
             footer.style.display = 'flex';
           } else {
             footer.style.display = 'none';
           }

           infoModal.style.display = 'flex';
        }
      });
    });
  </script>
</body>
</html>
