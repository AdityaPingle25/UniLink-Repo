<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration - UniLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../assets/css/student_dashboard.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">UniLink</div>
    </div>
    <nav class="nav-items">
      <a href="../../pages/student/student_dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i> <span>Dashboard</span></a>
      <a href="../../pages/common/announcements.html" class="nav-item"><i class="ph ph-megaphone"></i> <span>Announcements</span></a>
      <a href="../../pages/student/deadlines.html" class="nav-item"><i class="ph ph-calendar-check"></i> <span>Deadlines</span></a>
      <a href="../../pages/common/internships.html" class="nav-item"><i class="ph ph-rocket"></i> <span>Internships & Hackathons</span></a>
      <a href="../../pages/common/events.html" class="nav-item active"><i class="ph ph-ticket"></i> <span>Events</span></a>
      <a href="../../pages/common/scholarships.html" class="nav-item"><i class="ph ph-graduation-cap"></i> <span>Scholarships</span></a>
      <a href="../../pages/common/news.html" class="nav-item"><i class="ph ph-newspaper"></i> <span>Campus News</span></a>
      <a href="../../pages/student/ask_seniors.html" class="nav-item"><i class="ph ph-users-three"></i> <span>Ask Seniors</span></a>
      <a href="../../pages/common/blog.html" class="nav-item"><i class="ph ph-article"></i> <span>Blog</span></a>
    </nav>
    <nav class="nav-items" style="margin-top: auto;">
      <a href="#" class="nav-item"><i class="ph ph-gear"></i> <span>Settings</span></a>
    </nav>
  </aside>

  <main class="main-wrapper">
    <header class="top-nav">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="mobile-menu-btn"><i class="ph ph-list"></i></button>
      </div>
      <div class="search-bar">
        <i class="ph ph-magnifying-glass" style="color: var(--text-muted)"></i>
        <input type="text" placeholder="Search events, workshops, fests...">
      </div>
      <div class="profile-area">
        <button class="icon-btn"><i class="ph ph-bell"></i><span class="notification-dot"></span></button>
        <div class="user-profile">
          <div class="avatar" id="navAvatar">S</div>
          <div class="user-info">
            <span class="user-name" id="navUserName">Student</span>
            <span class="user-role">Student</span>
          </div>
        </div>
      </div>
    </header>

    <section class="welcome-section">
      <h1 class="welcome-title">Campus Events</h1>
      <p style="color: var(--text-muted); font-size: 15px;">Discover and register for upcoming campus events.</p>
    </section>

    <div class="events-list" id="eventsContainer">
      <p style="color: var(--text-muted); padding: 40px 0; text-align: center;">Loading events...</p>
    </div>
    <!-- Registration Modal -->
    <div class="modal-overlay" id="regModal">
      <div class="modal">
        <h2 id="modalTitle">Register for Event</h2>
        <p class="subtitle" id="modalSubtitle">Fill in your details to register</p>
        <form id="regForm">
          <input type="hidden" id="regEventId">
          <div class="form-group">
            <label>Your Full Name *</label>
            <input type="text" id="regName" required placeholder="e.g. Aditya Pingle">
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" id="regEmail" required placeholder="e.g. aditya@college.edu">
          </div>
          <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="regPhone" required placeholder="e.g. 9876543210">
          </div>
          <div id="teamSection" style="display: none;">
            <h4 style="font-size: 14px; margin: 16px 0 8px; color: var(--text-main);">Team Members</h4>
            <div id="teamMembersContainer"></div>
          </div>
          <div class="modal-actions">
          <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn-submit">Register</button>
        </div>
        </form>
      </div>
    </div>
  </main>

  <script src="../../assets/js/app.js"></script>
  <script>
    const storedName = localStorage.getItem('userName');
    if (storedName) {
      document.getElementById('navUserName').innerText = storedName;
      document.getElementById('navAvatar').innerText = storedName.charAt(0).toUpperCase();
    }

    let currentTeamSize = 1;

    function openRegModal(eventId, eventTitle, teamSize) {
      document.getElementById('regEventId').value = eventId;
      document.getElementById('modalTitle').innerText = 'Register: ' + eventTitle;
      document.getElementById('modalSubtitle').innerText = teamSize > 1 ? `Team event — add ${teamSize - 1} team member(s)` : 'Individual registration';
      currentTeamSize = teamSize;
      
      const teamSection = document.getElementById('teamSection');
      const teamContainer = document.getElementById('teamMembersContainer');
      teamContainer.innerHTML = '';

      if (teamSize > 1) {
        teamSection.style.display = 'block';
        for (let i = 1; i < teamSize; i++) {
          teamContainer.innerHTML += `
            <div class="team-member-row">
              <h4>Member ${i + 1}</h4>
              <div class="form-group"><label>Name *</label><input type="text" class="tm-name" required placeholder="Full name"></div>
              <div class="form-group"><label>Email</label><input type="email" class="tm-email" placeholder="Email"></div>
              <div class="form-group"><label>Phone</label><input type="tel" class="tm-phone" placeholder="Phone"></div>
            </div>
          `;
        }
      } else {
        teamSection.style.display = 'none';
      }

      document.getElementById('regModal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('regModal').classList.remove('active');
      document.getElementById('regForm').reset();
    }

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const eventId = document.getElementById('regEventId').value;
      const teamMembers = [];
      document.querySelectorAll('.team-member-row').forEach(row => {
        teamMembers.push({
          name: row.querySelector('.tm-name').value,
          email: row.querySelector('.tm-email').value,
          phone: row.querySelector('.tm-phone').value
        });
      });

      const payload = {
        studentName: document.getElementById('regName').value,
        studentEmail: document.getElementById('regEmail').value,
        studentPhone: document.getElementById('regPhone').value,
        teamMembers
      };

      try {
        const res = await fetch(`http://localhost:3000/api/events/${eventId}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const result = await res.json();
        if (result.success) {
          alert('Successfully registered!');
          closeModal();
          loadEvents();
        } else {
          alert(result.message || 'Registration failed');
        }
      } catch (err) {
        alert('Error registering. Make sure server is running.');
      }
    });

    async function loadEvents() {
      try {
        const res = await fetch('http://localhost:3000/api/events');
        const data = await res.json();
        const container = document.getElementById('eventsContainer');
        container.innerHTML = '';

        if (data.success && data.data.length > 0) {
          for (const ev of data.data) {
            const countRes = await fetch(`http://localhost:3000/api/events/${ev._id}/count`);
            const countData = await countRes.json();
            const regCount = countData.count || 0;
            const spotsLeft = ev.maxRegistrations - regCount;

            const categoryColors = { 'Technical': 'bg-purple', 'Cultural': 'bg-rose', 'Workshop': 'bg-sky', 'Sports': 'bg-emerald', 'Seminar': 'bg-amber' };
            const colorClass = categoryColors[ev.category] || 'bg-indigo';

            const eventDate = new Date(ev.eventDate);
            const month = eventDate.toLocaleString('default', { month: 'short' }).toUpperCase();
            const day = eventDate.getDate();

            container.innerHTML += `
              <div class="event-card">
                <div class="event-date-box ${colorClass}">
                  <span class="month">${month}</span>
                  <span class="day">${day}</span>
                </div>
                <div class="event-content">
                  <div class="event-header">
                    <h3>${ev.title}</h3>
                    <span class="badge ${colorClass}-light color-${colorClass.replace('bg-','')}">${ev.category}</span>
                  </div>
                  <p class="event-details"><i class="ph ph-map-pin"></i> ${ev.venue} • <i class="ph ph-clock"></i> ${ev.eventTime}${ev.teamSize > 1 ? ' • <i class="ph ph-users"></i> Team of ' + ev.teamSize : ''}</p>
                  <p class="event-desc">${ev.description}</p>
                </div>
                <div class="event-action">
                  <div class="spots-left" ${spotsLeft <= 5 ? 'style="color: #e11d48;"' : ''}>${spotsLeft > 0 ? spotsLeft + ' Spots Left' : 'Event Full'}</div>
                  ${spotsLeft > 0 ? `<button class="primary-btn" onclick="openRegModal('${ev._id}', '${ev.title.replace(/'/g, "\\'")}', ${ev.teamSize})">Register</button>` : '<button class="primary-btn" disabled style="opacity: 0.5;">Full</button>'}
                </div>
              </div>
            `;
          }
        } else {
          container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 40px 0;">No events available right now. Check back soon!</p>';
        }
      } catch (err) {
        document.getElementById('eventsContainer').innerHTML = '<p style="color: #e11d48; text-align: center; padding: 40px 0;">Failed to load events. Make sure the server is running.</p>';
      }
    }

    loadEvents();
  </script>
</body>
</html>
