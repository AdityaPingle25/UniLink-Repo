<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Registration - UniLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../assets/css/student_dashboard.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">UniLink</div>
    </div>
    <nav class="nav-items">
      <a href="../../pages/student/student_dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i> <span>Dashboard</span></a>
      <a href="../../pages/common/announcements.html" class="nav-item"><i class="ph ph-megaphone"></i> <span>Important Announcements</span></a>
      <a href="../../pages/common/deadlines.html" class="nav-item"><i class="ph ph-calendar-check"></i> <span>Assignment Deadlines</span></a>
      <a href="../../pages/common/internships.html" class="nav-item"><i class="ph ph-rocket"></i> <span>Internships & Hackathons</span></a>
      <a href="../../pages/common/events.html" class="nav-item active"><i class="ph ph-ticket"></i> <span>Event Registration</span></a>
      <a href="../../pages/common/scholarships.html" class="nav-item"><i class="ph ph-graduation-cap"></i> <span>Scholarships</span></a>
      <a href="../../pages/common/blog.html" class="nav-item"><i class="ph ph-article"></i> <span>Blog</span></a>
    </nav>
    <nav class="nav-items" style="margin-top: auto;">
      <a href="#" class="nav-item text-danger" id="logoutBtn"><i class="ph ph-sign-out"></i> <span style="color: #e11d48;">Log Out</span></a>
    </nav>
  </aside>

  <main class="main-wrapper">
    <header class="top-nav">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="mobile-menu-btn"><i class="ph ph-list"></i></button>
      </div>
      <div class="profile-area" style="margin-left: auto;">
        <button class="icon-btn" id="themeToggleBtn"><i class="ph ph-moon"></i></button>
        <a href="../../pages/student/student_profile.html" class="user-profile" style="text-decoration: none; color: inherit; cursor: pointer;">
          <div class="avatar" id="navAvatar">S</div>
          <div class="user-info">
            <span class="user-name" id="navUserName">Student</span>
            <span class="user-role">Student</span>
          </div>
          <i class="ph ph-caret-down" style="color: var(--text-muted); margin-left: 8px;"></i>
        </a>
      </div>
    </header>

    <section class="welcome-section">
      <h1 class="welcome-title">Campus Events</h1>
      <p style="color: var(--text-muted); font-size: 15px;">Discover and register for upcoming campus events.</p>
    </section>

    <div class="events-list" id="eventsContainer" style="margin-bottom: 40px;">
      <p style="color: var(--text-muted); padding: 40px 0; text-align: center;">Loading events...</p>
    </div>

    <!-- Image Grid with Filtering (Past Highlights) -->
    <section style="margin-bottom: 40px;">
      <h2 style="font-size: 18px; margin-bottom: 16px;">Past Event Highlights</h2>
      <div class="filter-tabs" id="galleryFilters" style="margin-bottom: 20px;">
        <button class="filter-tab active" data-gfilter="all">All</button>
        <button class="filter-tab" data-gfilter="tech">Technical</button>
        <button class="filter-tab" data-gfilter="cultural">Cultural</button>
      </div>
      <div class="image-grid" id="galleryGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
        <div class="g-item tech" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000105514.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Technical Expo"></div>
        <div class="g-item cultural" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000126471.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Musical Performance"></div>
        <div class="g-item tech" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000105511.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Project Display"></div>
        <div class="g-item cultural" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000126473.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Traditional Performance"></div>
        <div class="g-item tech" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000105512.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Winner Celebration"></div>
        <div class="g-item cultural" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000126475.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Stage Performance"></div>
        <div class="g-item tech" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000105513.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Team Work"></div>
        <div class="g-item tech" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000105515.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="Technical Symposium"></div>
        <div class="g-item tech" style="border-radius: 8px; overflow: hidden; aspect-ratio: 1;"><img src="../../assets/img/1000126469.jpg" style="width: 100%; height: 100%; object-fit: cover;" alt="ACM India Award"></div>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (localStorage.getItem('userRole') === 'Teacher') {
        const tName = localStorage.getItem('teacherName') || 'Faculty';
        document.getElementById('navUserName').innerText = tName;
        document.getElementById('navAvatar').innerText = tName.charAt(0).toUpperCase();
        const roleSpan = document.querySelector('.user-role');
        if(roleSpan) roleSpan.innerText = 'Faculty';
        const profileLink = document.querySelector('.user-profile');
        if(profileLink) profileLink.href = '../../pages/teacher/teacher_profile.html';

        // Override Sidebar
        const sidebar = document.querySelector('.sidebar .nav-items');
        if(sidebar) {
          sidebar.innerHTML = `
            <a href="../../pages/teacher/teacher_dashboard.html#dashboard" class="nav-item"><i class="ph ph-squares-four"></i> <span>Overview</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#post-announcement" class="nav-item"><i class="ph ph-megaphone"></i> <span>Post Announcement</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#manage-assignments" class="nav-item"><i class="ph ph-calendar-check"></i> <span>Manage Assignments</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#student-list" class="nav-item"><i class="ph ph-users"></i> <span>My Students</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#opportunities" class="nav-item"><i class="ph ph-rocket"></i> <span>Opportunities</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#scholarships" class="nav-item"><i class="ph ph-graduation-cap"></i> <span>Scholarships</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#events" class="nav-item"><i class="ph ph-ticket"></i> <span>Manage Events</span></a>
          `;
          
          // Mark active if matches current page
          const links = sidebar.querySelectorAll('a');
          const currentUrl = window.location.href;
          links.forEach(l => {
            if (currentUrl.includes(l.getAttribute('href').split('/').pop())) {
              l.classList.add('active');
            }
          });
        }
      } else {
        const storedName = localStorage.getItem('userName');
        if (storedName) {
          document.getElementById('navUserName').innerText = storedName;
          document.getElementById('navAvatar').innerText = storedName.charAt(0).toUpperCase();
        }
      }

      // Theme logic
      const themeToggleBtn = document.getElementById('themeToggleBtn');
      const themeIcon = themeToggleBtn.querySelector('i');
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
        themeIcon.classList.replace('ph-moon', 'ph-sun');
      }
      themeToggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        if (document.body.classList.contains('dark-theme')) {
          localStorage.setItem('theme', 'dark');
          themeIcon.classList.replace('ph-moon', 'ph-sun');
        } else {
          localStorage.setItem('theme', 'light');
          themeIcon.classList.replace('ph-sun', 'ph-moon');
        }
      });

      // Logout logic
      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', (e) => {
          e.preventDefault();
          localStorage.clear();
          if (localStorage.getItem('userRole') === 'Teacher') {
            window.location.href = '../../pages/auth/teacher_login.html';
          } else {
            window.location.href = '../../pages/auth/student_login.html';
          }
        });
      }

      async function loadEvents() {
        try {
          const res = await fetch('/api/events');
          const data = await res.json();
          const container = document.getElementById('eventsContainer');
          container.innerHTML = '';

          if (data.success && data.data.length > 0) {
            for (const ev of data.data) {
              const countRes = await fetch(`/api/events/${ev._id}/count`);
              const countData = await countRes.json();
              const regCount = countData.count || 0;
              const spotsLeft = ev.maxRegistrations - regCount;

              const categoryColors = { 'Technical': 'bg-purple', 'Cultural': 'bg-rose', 'Workshop': 'bg-sky', 'Sports': 'bg-emerald', 'Seminar': 'bg-amber' };
              const colorClass = categoryColors[ev.category] || 'bg-indigo';

              const eventDate = new Date(ev.eventDate);
              const month = eventDate.toLocaleString('default', { month: 'short' }).toUpperCase();
              const day = eventDate.getDate();

              container.innerHTML += `
                <div class="event-card">
                  <div class="event-date-box ${colorClass}">
                    <span class="month">${month}</span>
                    <span class="day">${day}</span>
                  </div>
                  <div class="event-content">
                    <div class="event-header">
                      <h3>${ev.title}</h3>
                      <span class="badge ${colorClass}-light color-${colorClass.replace('bg-','')}">${ev.category}</span>
                    </div>
                    <p class="event-details"><i class="ph ph-map-pin"></i> ${ev.venue} • <i class="ph ph-clock"></i> ${ev.eventTime}${ev.teamSize > 1 ? ' • <i class="ph ph-users"></i> Team of ' + ev.teamSize : ''}${ev.prizePool ? ' • <i class="ph ph-trophy"></i> ' + ev.prizePool : ''}</p>
                    <p class="event-desc">${ev.description}</p>
                  </div>
                  <div class="event-action">
                    <div class="spots-left" ${spotsLeft <= 5 ? 'style="color: #e11d48;"' : ''}>${spotsLeft > 0 ? spotsLeft + ' Spots Left' : 'Event Full'}</div>
                    <a href="../public/event_details.html?id=${ev._id}" class="primary-btn" style="text-decoration: none; display: inline-flex; align-items: center; gap: 6px;">
                      ${spotsLeft > 0 ? '<i class="ph ph-arrow-right"></i> View & Register' : '<i class="ph ph-eye"></i> View Details'}
                    </a>
                  </div>
                </div>
              `;
            }
          } else {
            container.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 40px 0;">No events available right now. Check back soon!</p>';
          }
        } catch (err) {
          document.getElementById('eventsContainer').innerHTML = '<p style="color: #e11d48; text-align: center; padding: 40px 0;">Failed to load events. Make sure the server is running.</p>';
        }
      }

      loadEvents();

      // Image Grid Filtering Logic
      const gFilters = document.querySelectorAll('#galleryFilters .filter-tab');
      const gItems = document.querySelectorAll('.g-item');
      if(gFilters.length > 0) {
        gFilters.forEach(btn => {
          btn.addEventListener('click', () => {
            gFilters.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filter = btn.getAttribute('data-gfilter');
            gItems.forEach(item => {
              if(filter === 'all' || item.classList.contains(filter)) item.style.display = '';
              else item.style.display = 'none';
            });
          });
        });
      }
    });
  </script>
</body>
</html>
