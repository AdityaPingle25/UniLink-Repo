<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scholarships - UniLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../assets/css/student_dashboard.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">UniLink</div>
    </div>
    <nav class="nav-items">
      <a href="../../pages/student/student_dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i> <span>Dashboard</span></a>
      <a href="../../pages/common/announcements.html" class="nav-item"><i class="ph ph-megaphone"></i> <span>Announcements</span></a>
      <a href="../../pages/student/deadlines.html" class="nav-item"><i class="ph ph-calendar-check"></i> <span>Deadlines</span></a>
      <a href="../../pages/common/internships.html" class="nav-item"><i class="ph ph-rocket"></i> <span>Internships & Hackathons</span></a>
      <a href="../../pages/common/events.html" class="nav-item"><i class="ph ph-ticket"></i> <span>Events</span></a>
      <a href="../../pages/common/scholarships.html" class="nav-item active"><i class="ph ph-graduation-cap"></i> <span>Scholarships</span></a>
      <a href="../../pages/common/blog.html" class="nav-item"><i class="ph ph-article"></i> <span>Blog</span></a>
    </nav>
    <nav class="nav-items" style="margin-top: auto;">
      
    </nav>
  </aside>

  <main class="main-wrapper">
    <header class="top-nav">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="mobile-menu-btn"><i class="ph ph-list"></i></button>
      </div>
      <div class="search-bar">
        <i class="ph ph-magnifying-glass" style="color: var(--text-muted)"></i>
        <input type="text" placeholder="Search scholarships...">
      </div>
      <div class="profile-area">
        <button class="icon-btn"><i class="ph ph-bell"></i><span class="notification-dot"></span></button>
        <div class="user-profile">
          <div class="avatar" id="navAvatar">S</div>
          <div class="user-info">
            <span class="user-name" id="navUserName">Student</span>
            <span class="user-role">Student</span>
          </div>
        </div>
      </div>
    </header>

    <section class="welcome-section">
      <h1 class="welcome-title">Scholarships</h1>
      <p style="color: var(--text-muted); font-size: 15px;">Browse scholarships by category and apply before deadlines.</p>
    </section>

    <div class="filter-tabs" id="categoryFilters">
      <button class="filter-tab active" data-filter="All">All</button>
      <button class="filter-tab" data-filter="SC/ST">SC/ST</button>
      <button class="filter-tab" data-filter="OBC">OBC</button>
      <button class="filter-tab" data-filter="EWS">EWS</button>
      <button class="filter-tab" data-filter="General">General</button>
      <button class="filter-tab" data-filter="Minority">Minority</button>
    </div>

    <div class="dashboard-grid" id="scholarshipsGrid">
      <p style="color: var(--text-muted); text-align: center; grid-column: 1 / -1; padding: 40px 0;">Loading scholarships...</p>
    </div>
  </main>

  <script src="../../assets/js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const storedName = localStorage.getItem('userName');
      if (storedName) {
        document.getElementById('navUserName').innerText = storedName;
        document.getElementById('navAvatar').innerText = storedName.charAt(0).toUpperCase();
      }

      let allScholarships = [];

      function renderScholarships(items) {
        const grid = document.getElementById('scholarshipsGrid');
        grid.innerHTML = '';
        if (items.length > 0) {
          items.forEach(item => {
            const bgColors = ['bg-indigo', 'bg-emerald', 'bg-rose', 'bg-amber', 'bg-sky', 'bg-purple'];
            const randomBg = bgColors[Math.floor(Math.random() * bgColors.length)];
            const category = item.category || item.department || 'General';
            grid.innerHTML += `
              <div class="card">
                <div class="card-header">
                  <div class="card-icon ${randomBg}"><i class="ph ph-bank"></i></div>
                  <h2 class="card-title">${item.title}</h2>
                </div>
                <p class="card-desc">${item.description}</p>
                <div class="card-meta" style="flex-direction: column; align-items: flex-start; gap: 12px; width: 100%;">
                  <div style="display: flex; justify-content: space-between; width: 100%; font-size: 13px;">
                    <span style="color: var(--text-muted);">Amount</span>
                    <span style="font-weight: 600;">${item.amount}</span>
                  </div>
                  <div style="display: flex; justify-content: space-between; width: 100%; font-size: 13px;">
                    <span style="color: var(--text-muted);">Deadline</span>
                    <span style="font-weight: 600;">${new Date(item.deadline).toLocaleDateString()}</span>
                  </div>
                  <div style="display: flex; justify-content: space-between; width: 100%; font-size: 13px;">
                    <span style="color: var(--text-muted);">Category</span>
                    <span style="font-weight: 600; color: var(--primary);">${category}</span>
                  </div>
                  <a href="${item.applyLink}" target="_blank" class="primary-btn" style="width: 100%; justify-content: center; text-decoration: none;">Apply Now</a>
                </div>
              </div>
            `;
          });
        } else {
          grid.innerHTML = '<p style="color: var(--text-muted); grid-column: 1 / -1; text-align: center; padding: 40px 0;">No scholarships found for this category.</p>';
        }
      }

      fetch('http://localhost:3000/api/scholarships')
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            allScholarships = data.data;
            renderScholarships(allScholarships);
          }
        });

      // Filter tabs
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          const filter = tab.dataset.filter;
          if (filter === 'All') {
            renderScholarships(allScholarships);
          } else {
            renderScholarships(allScholarships.filter(s => (s.category || s.department) === filter));
          }
        });
      });
    });
  </script>
</body>
</html>
