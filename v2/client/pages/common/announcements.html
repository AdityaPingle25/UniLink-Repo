<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Important Announcements - UniLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../assets/css/student_dashboard.css">
</head>
<body>

  <aside class="sidebar">
    <div class="logo">
      <div class="logo-text">UniLink</div>
    </div>
    <nav class="nav-items">
      <a href="../../pages/student/student_dashboard.html" class="nav-item"><i class="ph ph-squares-four"></i> <span>Dashboard</span></a>
      <a href="../../pages/common/announcements.html" class="nav-item active"><i class="ph ph-megaphone"></i> <span>Important Announcements</span></a>
      <a href="../../pages/student/deadlines.html" class="nav-item"><i class="ph ph-calendar-check"></i> <span>Assignment Deadlines</span></a>
      <a href="../../pages/common/internships.html" class="nav-item"><i class="ph ph-rocket"></i> <span>Internships & Hackathons</span></a>
      <a href="../../pages/common/events.html" class="nav-item"><i class="ph ph-ticket"></i> <span>Event Registration</span></a>
      <a href="../../pages/common/scholarships.html" class="nav-item"><i class="ph ph-graduation-cap"></i> <span>Scholarships</span></a>
      <a href="../../pages/common/blog.html" class="nav-item"><i class="ph ph-article"></i> <span>Blog</span></a>
    </nav>
    <nav class="nav-items" style="margin-top: auto;">
      <a href="#" class="nav-item text-danger" id="logoutBtn"><i class="ph ph-sign-out"></i> <span style="color: #e11d48;">Log Out</span></a>
    </nav>
  </aside>

  <main class="main-wrapper">
    <header class="top-nav">
      <div style="display: flex; align-items: center; gap: 16px;">
        <button class="mobile-menu-btn"><i class="ph ph-list"></i></button>
      </div>
      <div class="profile-area" style="margin-left: auto;">
        <button class="icon-btn" id="themeToggleBtn"><i class="ph ph-moon"></i></button>
        <a href="../../pages/student/student_profile.html" class="user-profile" style="text-decoration: none; color: inherit; cursor: pointer;">
          <div class="avatar" id="navAvatar">S</div>
          <div class="user-info">
            <span class="user-name" id="navUserName">Student</span>
            <span class="user-role">Student</span>
          </div>
          <i class="ph ph-caret-down" style="color: var(--text-muted); margin-left: 8px;"></i>
        </a>
      </div>
    </header>

    <section class="welcome-section">
      <h1 class="welcome-title">Important Announcements</h1>
      <p style="color: var(--text-muted); font-size: 15px;">Official circulars, academic notices, and urgent updates.</p>
    </section>

    <!-- Announcements List -->
    <div class="announcement-list" id="announcementsContainer">
      <p style="color: var(--text-muted); padding: 20px;">Loading announcements...</p>
    </div>

  </main>

  <script>
    (function() {
      if (localStorage.getItem('userRole') === 'Teacher') {
        const tName = localStorage.getItem('teacherName') || 'Faculty';
        const navUserName = document.getElementById('navUserName');
        const navAvatar = document.getElementById('navAvatar');
        if (navUserName) navUserName.innerText = tName;
        if (navAvatar) navAvatar.innerText = tName.charAt(0).toUpperCase();
        
        const roleSpan = document.querySelector('.user-role');
        if(roleSpan) roleSpan.innerText = 'Faculty';
        const profileLink = document.querySelector('.user-profile');
        if(profileLink) profileLink.href = '../../pages/teacher/teacher_profile.html';

        // Override Sidebar
        const sidebar = document.querySelector('.sidebar .nav-items');
        if (sidebar) {
          sidebar.innerHTML = `
            <a href="../../pages/teacher/teacher_dashboard.html#dashboard" class="nav-item"><i class="ph ph-squares-four"></i> <span>Overview</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#post-announcement" class="nav-item active"><i class="ph ph-megaphone"></i> <span>Post Announcement</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#manage-assignments" class="nav-item"><i class="ph ph-calendar-check"></i> <span>Manage Assignments</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#student-list" class="nav-item"><i class="ph ph-users"></i> <span>My Students</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#opportunities" class="nav-item"><i class="ph ph-rocket"></i> <span>Opportunities</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#scholarships" class="nav-item"><i class="ph ph-graduation-cap"></i> <span>Scholarships</span></a>
            <a href="../../pages/teacher/teacher_dashboard.html#events" class="nav-item"><i class="ph ph-ticket"></i> <span>Manage Events</span></a>
          `;
        }

        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../../pages/auth/teacher_login.html';
          });
        }
      } else {
        // Setup Student Nav Profile
        const storedName = localStorage.getItem('userName');
        const navUserName = document.getElementById('navUserName');
        const navAvatar = document.getElementById('navAvatar');
        if (storedName && navUserName) navUserName.innerText = storedName;
        if (storedName && navAvatar) navAvatar.innerText = storedName.charAt(0).toUpperCase();

        // Logout logic
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
          logoutBtn.addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = '../../pages/auth/student_login.html';
          });
        }
      }

      // Theme logic
      const themeToggleBtn = document.getElementById('themeToggleBtn');
      if (themeToggleBtn) {
        const themeIcon = themeToggleBtn.querySelector('i');
        if (localStorage.getItem('theme') === 'dark') {
          document.body.classList.add('dark-theme');
          themeIcon.classList.replace('ph-moon', 'ph-sun');
        }
        themeToggleBtn.addEventListener('click', () => {
          document.body.classList.toggle('dark-theme');
          if (document.body.classList.contains('dark-theme')) {
            localStorage.setItem('theme', 'dark');
            themeIcon.classList.replace('ph-moon', 'ph-sun');
          } else {
            localStorage.setItem('theme', 'light');
            themeIcon.classList.replace('ph-sun', 'ph-moon');
          }
        });
      }

      // Fetch Announcements — filtered to the student's profile
      async function loadAnnouncements() {
        try {
          const response = await fetch('/api/announcements');
          const result = await response.json();
          const container = document.getElementById('announcementsContainer');
          if (!container) return;
          container.innerHTML = '';

          if (result.success && result.data.length > 0) {
            // Student profile from localStorage
            const studentYear     = (localStorage.getItem('userYear') || '').trim();
            const studentBranch   = (localStorage.getItem('userBranch') || '').trim();
            const studentDivision = (localStorage.getItem('userDivision') || '').trim();

            // Filter: show if audience matches student OR is "All Students"
            const visible = result.data.filter(ann => {
              const aud = (ann.audience || '').trim();
              if (!aud || aud === 'All Students') return true;
              if (aud.startsWith('Year:')) {
                const target = aud.slice(5).trim().toUpperCase();
                return studentYear.toUpperCase() === target;
              }
              if (aud.startsWith('Dept:')) {
                const target = aud.slice(5).trim().toLowerCase();
                return studentBranch.toLowerCase() === target;
              }
              if (aud.startsWith('Division:')) {
                const target = aud.slice(9).trim().toLowerCase();
                return studentDivision.toLowerCase() === target;
              }
              // Legacy plain audience string — show to everyone
              return true;
            });

            if (visible.length === 0) {
              container.innerHTML = '<p style="color: var(--text-muted); padding: 20px;">No announcements for your profile right now.</p>';
              return;
            }

            visible.forEach(ann => {
              const dateStr = new Date(ann.createdAt).toLocaleDateString();

              // Format audience badge
              let audienceBadge = ann.audience || 'All Students';
              if (audienceBadge.startsWith('Year:')) audienceBadge = '📅 Year: ' + audienceBadge.slice(5);
              else if (audienceBadge.startsWith('Dept:')) audienceBadge = '🏛️ Dept: ' + audienceBadge.slice(5);
              else if (audienceBadge.startsWith('Division:')) audienceBadge = '👥 Division: ' + audienceBadge.slice(9);
              else audienceBadge = '🌐 ' + audienceBadge;

              let fileHtml = '';
              if (ann.fileName && ann.fileUrl) {
                // Determine file type icon
                const ext = ann.fileName.split('.').pop().toLowerCase();
                let fileIcon = 'ph-file';
                let fileColor = '#6366f1';
                if (['pdf'].includes(ext)) { fileIcon = 'ph-file-pdf'; fileColor = '#e11d48'; }
                else if (['doc','docx'].includes(ext)) { fileIcon = 'ph-file-doc'; fileColor = '#2563eb'; }
                else if (['xls','xlsx'].includes(ext)) { fileIcon = 'ph-file-xls'; fileColor = '#059669'; }
                else if (['jpg','jpeg','png','gif','webp'].includes(ext)) { fileIcon = 'ph-file-image'; fileColor = '#d97706'; }
                else if (['ppt','pptx'].includes(ext)) { fileIcon = 'ph-file-ppt'; fileColor = '#dc2626'; }
                else if (['zip','rar','7z'].includes(ext)) { fileIcon = 'ph-file-zip'; fileColor = '#7c3aed'; }

                fileHtml = `
                  <div style="margin-top: 14px; padding: 14px; background: rgba(79, 70, 229, 0.04); border: 1px solid rgba(79, 70, 229, 0.12); border-radius: 12px; display: flex; align-items: center; gap: 14px;">
                    <div style="width: 44px; height: 44px; border-radius: 10px; background: ${fileColor}15; color: ${fileColor}; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;">
                      <i class="ph ${fileIcon}"></i>
                    </div>
                    <div style="flex: 1; min-width: 0;">
                      <div style="font-size: 14px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${ann.fileName}</div>
                      <div style="font-size: 12px; color: var(--text-muted); margin-top: 2px;">${ext.toUpperCase()} File · Attached by ${ann.postedBy || 'Teacher'}</div>
                    </div>
                    <a href="${ann.fileUrl}" download="${ann.fileName}" style="padding: 8px 16px; background: var(--primary); color: white; border-radius: 8px; font-size: 13px; font-weight: 600; text-decoration: none; white-space: nowrap; display: flex; align-items: center; gap: 6px;">
                      <i class="ph ph-download-simple"></i> Download
                    </a>
                  </div>`;
              }
              container.innerHTML += `
                <div class="announcement-card unread">
                  <div class="announcement-icon bg-indigo"><i class="ph ph-megaphone"></i></div>
                  <div class="announcement-content">
                    <div class="announcement-header">
                      <h3 class="announcement-title">${ann.title}</h3>
                      <span class="announcement-date">${dateStr}</span>
                    </div>
                    <div class="desc-wrapper" style="position: relative;">
                      <p class="announcement-desc">${ann.description}</p>
                      <span onclick="const p = this.previousElementSibling; if(p.style.display === 'block'){ p.style.display = '-webkit-box'; this.innerText = 'Read More'; } else { p.style.display = 'block'; this.innerText = 'Read Less'; }" style="color: var(--primary); font-size: 13px; font-weight: 600; cursor: pointer; display: inline-block; margin-bottom: 12px; padding: 6px 12px; background: rgba(99, 102, 241, 0.1); border-radius: 6px; border: 1px solid rgba(99, 102, 241, 0.2);">Read More</span>
                    </div>
                    ${fileHtml}
                    <div class="announcement-meta">
                      <span class="badge" style="background: rgba(0,0,0,0.05)">From: ${ann.postedBy} (${ann.department || ''})</span>
                      <span class="badge" style="background: rgba(0,0,0,0.05)">${audienceBadge}</span>
                    </div>
                  </div>
                </div>
              `;
            });
          } else {
            container.innerHTML = '<p style="color: var(--text-muted); padding: 20px;">No announcements found.</p>';
          }
        } catch (err) {
          console.error('Error fetching announcements:', err);
          const container = document.getElementById('announcementsContainer');
          if (container) {
            container.innerHTML = '<p style="color: #e11d48; padding: 20px;">Failed to load announcements from server.</p>';
          }
        }
      }
      loadAnnouncements();
    })();
  </script>
</body>
</html>
