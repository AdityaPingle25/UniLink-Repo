<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Faculty Sign Up - UniLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../assets/css/student_login.css">
  <style>
    /* Override primary to Emerald for faculty */
    :root {
      --primary: #059669;
      --primary-hover: #047857;
    }
    .left-panel {
      background: linear-gradient(135deg, rgba(5, 150, 105, 0.9), rgba(16, 185, 129, 0.8)), url('../../assets/img/Login-Page.gif') center/cover no-repeat;
    }
    .login-btn {
      background: var(--primary);
    }
    
    /* Styles for additional signup elements not in standard css */
    .input-wrapper select {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border-radius: 12px;
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      font-size: 15px;
      color: var(--text-main);
      transition: all 0.2s ease;
      outline: none;
      appearance: none;
      font-family: inherit;
    }
    .input-wrapper select:focus {
      border-color: var(--primary);
      background: white;
      box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.1);
    }
    .input-wrapper .select-icon {
      position: absolute;
      right: 16px;
      font-size: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .signup-container {
      max-width: 480px;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-wrapper i.ph {
      position: absolute;
      left: 14px;
      font-size: 18px;
      color: var(--text-muted);
    }
    .login-header h1 { font-size: 28px; }
    .login-wrapper { margin-top: 40px; margin-bottom: 40px; overflow: visible; }
    .right-panel { padding-top: 30px; padding-bottom: 30px; }
    .form-row .input-wrapper input { padding-left: 40px; }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <!-- LEFT PANEL IMAGE -->
    <div class="left-panel">
      <div class="overlay-text">
        <div class="logo-area" style="margin-bottom: auto;">
          <div class="logo-text text-white">UniLink</div>
        </div>
        
        <div>
          <h2>Join UniLink Faculty.</h2>
          <p>Create your profile to post announcements, manage assignments, and stay connected with students.</p>
        </div>
      </div>
    </div>

    <!-- RIGHT SIGNUP FORM -->
    <div class="right-panel" style="overflow-y: auto;">
      <a href="teacher_login.html" class="back-link"><i class="ph ph-arrow-left"></i> Back to Login</a>
      
      <div class="form-container signup-container" style="margin-top: 20px;">
        <div class="login-header">
          <h1>Create Faculty Profile</h1>
          <p>Please enter your details to register as a teacher.</p>
        </div>

        <form id="signupForm">
          
          <div class="form-row">
            <div class="input-group">
              <label>Full Name</label>
              <div class="input-wrapper">
                <i class="ph ph-user"></i>
                <input type="text" id="fullName" placeholder="Dr. Smith" required>
              </div>
            </div>
            <div class="input-group">
              <label>Employee ID</label>
              <div class="input-wrapper">
                <i class="ph ph-identification-card"></i>
                <input type="text" id="employeeId" placeholder="e.g. EMP4002" required>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label>Email Address</label>
              <div class="input-wrapper">
                <i class="ph ph-envelope-simple"></i>
                <input type="email" id="email" placeholder="faculty@university.edu" required>
              </div>
            </div>
            <div class="input-group">
              <label>Password</label>
              <div class="input-wrapper">
                <i class="ph ph-lock-key"></i>
                <input type="password" id="password" placeholder="••••••••" required>
              </div>
            </div>
          </div>

          <div class="input-group">
            <label>Department</label>
            <div class="input-wrapper">
              <i class="ph ph-buildings"></i>
              <select id="department" required>
                <option value="" disabled selected>Select Department</option>
                <option value="CS">Computer Science</option>
                <option value="IT">Information Technology</option>
                <option value="CSE-AIML">AI & ML</option>
                <option value="Civil">Civil Engineering</option>
                <option value="ENTC">Electronics & Telecom</option>
                <option value="Mechanical">Mechanical Engineering</option>
                <option value="Science">Basic Sciences</option>
                <option value="Admin">Administration</option>
              </select>
              <i class="ph ph-caret-down select-icon"></i>
            </div>
          </div>

          <div class="input-group">
            <label>Divisions (Hold Ctrl/Cmd to select multiple)</label>
            <div class="input-wrapper">
              <i class="ph ph-users-three"></i>
              <select id="divisions" required multiple style="height: auto; padding: 12px 16px 12px 44px; min-height: 100px;">
                <option value="A">Division A</option>
                <option value="B">Division B</option>
                <option value="C">Division C</option>
                <option value="D">Division D</option>
              </select>
            </div>
          </div>

          <button type="submit" class="login-btn">Create Profile <i class="ph ph-user-plus"></i></button>

          <p class="signup-prompt">Already have an account? <a href="teacher_login.html">Log In Instead</a></p>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const payload = {
        fullName: document.getElementById('fullName').value,
        employeeId: document.getElementById('employeeId').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        department: document.getElementById('department').value,
        divisions: Array.from(document.getElementById('divisions').selectedOptions).map(opt => opt.value)
      };

      try {
        const response = await fetch('/api/auth/teacher/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.success) {
          localStorage.setItem('teacherDbId', result.data.id);
          localStorage.setItem('teacherName', result.data.fullName);
          localStorage.setItem('teacherEmail', result.data.email);
          localStorage.setItem('teacherId', result.data.employeeId);
          localStorage.setItem('teacherDept', result.data.department);
          localStorage.setItem('teacherDivisions', JSON.stringify(result.data.divisions));
          localStorage.setItem('teacherPhone', result.data.phone || 'Not set');
          localStorage.setItem('teacherCollege', result.data.college || 'PCCOE, Pune');
          localStorage.setItem('teacherSocialLinks', JSON.stringify([]));
          localStorage.setItem('userRole', 'Teacher');

          alert('Profile setup successful! Redirecting to Dashboard...');
          window.location.href = '../teacher/teacher_dashboard.html';
        } else {
          alert('Registration failed: ' + result.message);
        }
      } catch (err) {
        console.error('Error during registration:', err);
        alert('Server error. Please try again later.');
      }
    });
  </script>
</body>
</html>
