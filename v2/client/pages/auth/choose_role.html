<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Choose Login - UniLink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="../../assets/css/choose_role.css">
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="role-container">
    <div class="logo-area">
      <div class="logo-text">UniLink</div>
    </div>
    
    <h1>Welcome to UniLink</h1>
    <p class="subtitle">Please select your portal to continue</p>

    <div class="role-grid">
      <a href="../../pages/auth/student_login.html" class="role-card">
        <div class="role-icon bg-primary-light">
          <i class="ph ph-student"></i>
        </div>
        <h3>Student Portal</h3>
        <p>Access dashboard, assignments, events, and announcements.</p>
        <div class="arrow"><i class="ph ph-arrow-right"></i></div>
      </a>

      <a href="../../pages/auth/teacher_login.html" class="role-card">
        <div class="role-icon bg-emerald-light">
          <i class="ph ph-chalkboard-teacher"></i>
        </div>
        <h3>Faculty Portal</h3>
        <p>Manage classes, post circulars, and review submissions.</p>
        <div class="arrow"><i class="ph ph-arrow-right"></i></div>
      </a>
    </div>

    <a href="../../index.html" class="back-link"><i class="ph ph-arrow-left"></i> Back to Home</a>
  </div>

</body>
</html>
